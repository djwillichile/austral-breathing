name: representativeness

# Computes the REAL continental climate-representativeness surface from WorldClim
# 2.1 bioclim rasters. The rasters live on the UC Davis mirror
# (geodata.ucdavis.edu), which a restricted egress allowlist blocks — so this
# runs on a GitHub-hosted runner (open outbound internet) as a fetch proxy: it
# downloads WorldClim, runs the analysis, and commits ONLY the small downsampled
# representativeness_grid.json back to the branch. The multi-hundred-MB .tif
# archives are never committed (they live under data/climate/, which is
# git-ignored and discarded with the runner).
#
# Triggers on changes to the analysis source / this workflow, or manually.

on:
  workflow_dispatch:
    inputs:
      resolution:
        description: 'WorldClim 2.1 resolution (10m, 5m, 2.5m, 30s)'
        default: '5m'
  push:
    paths:
      - scripts_representativeness_analysis.py
      - .github/workflows/representativeness.yml

permissions:
  contents: write

jobs:
  representativeness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (incl. rasterio for real GeoTIFFs)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt rasterio

      - name: Download WorldClim + compute continental representativeness
        env:
          RES: ${{ github.event.inputs.resolution || '5m' }}
        run: |
          python3 scripts_representativeness_analysis.py \
            --download --resolution "$RES" \
            --region south-america --stations registry

      - name: Commit representativeness grid
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/data/representativeness_grid.json
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "Compute real continental climate representativeness (WorldClim 2.1)"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
