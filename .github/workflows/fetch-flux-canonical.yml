name: fetch-flux-canonical

# Acts as a fetch proxy: GitHub-hosted runners have open outbound internet,
# so they can reach the canonical flux-tower databases (AmeriFlux / ORNL /
# FLUXNET) that the dev container's egress allowlist blocks. The runner saves
# the raw responses under research/_canonical/ and commits them back to the
# branch, where the container can pull them via git (github is allowlisted).

on:
  workflow_dispatch:
  push:
    # Fire whenever this workflow file itself changes, on any branch (no
    # hard-coded branch name -> no dead triggers after branches are merged).
    paths:
      - .github/workflows/fetch-flux-canonical.yml

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Fetch canonical site lists
        run: |
          set -u
          mkdir -p research/_canonical
          log=research/_canonical/_fetch_log.txt
          : > "$log"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          fetch () {
            url="$1"; out="$2"
            code=$(curl -sS -L --max-time 90 -A "$UA" \
                   -H 'Accept: application/json, text/html, */*' \
                   -w '%{http_code}' -o "research/_canonical/$out" "$url" 2>>"$log" || echo 000)
            sz=$(wc -c < "research/_canonical/$out" 2>/dev/null || echo 0)
            printf '%s  %8s bytes  %s -> %s\n' "$code" "$sz" "$url" "$out" | tee -a "$log"
          }
          fetch "https://amfcdn.lbl.gov/api/v1/site_display/AmeriFlux"           "ameriflux_site_display.json"
          fetch "https://ameriflux.lbl.gov/sites/site-list-and-pages/"           "ameriflux_site_list.html"
          fetch "https://daac.ornl.gov/LBA/guides/CD32_Brazil_Flux_Network.html" "ornl_lba_cd32.html"
          fetch "https://fluxnet.org/sites/site-list-and-pages/"                 "fluxnet_site_list.html"

      - name: Discover data-availability + PI metadata
        run: |
          set -u
          mkdir -p research/_canonical/siteinfo
          log=research/_canonical/_discovery_log.txt
          : > "$log"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124 Safari/537.36"
          probe () {
            url="$1"; out="$2"
            code=$(curl -sS -L --max-time 90 -A "$UA" \
                   -H 'Accept: application/json, text/html, */*' \
                   -w '%{http_code}' -o "research/_canonical/$out" "$url" 2>>"$log" || echo 000)
            sz=$(wc -c < "research/_canonical/$out" 2>/dev/null || echo 0)
            printf '%s  %8s bytes  %s -> %s\n' "$code" "$sz" "$url" "$out" | tee -a "$log"
          }
          # --- candidate AmeriFlux data-availability / DOI APIs (discovery) ---
          probe "https://amfcdn.lbl.gov/api/v1/data_availability/AmeriFlux"        "avail_data_availability.json"
          probe "https://amfcdn.lbl.gov/api/v1/site_availability/AmeriFlux"        "avail_site_availability.json"
          probe "https://amfcdn.lbl.gov/api/v1/BADM/data_availability/AmeriFlux"   "avail_badm_data_availability.json"
          probe "https://amfcdn.lbl.gov/api/v1/fluxnet_published/AmeriFlux"        "avail_fluxnet_published.json"
          probe "https://amfcdn.lbl.gov/api/v1/data_product/BASE/AmeriFlux"        "avail_base_product.json"
          probe "https://amfcdn.lbl.gov/api/v1/doi/AmeriFlux"                      "avail_doi.json"
          # --- per-site siteinfo pages + per-site info API (PI, availability) ---
          SITES="BR-BNT BR-CMT BR-CUP BR-Cui BR-IAB BR-ITA BR-Ma3 BR-Moj BR-PRS BR-SGC BR-SM1 BR-SM2 BR-SM3 BR-SP1 BR-Xpw CL-FJS CL-OPP CO-GV2 PE-IGP"
          for s in $SITES; do
            probe "https://amfcdn.lbl.gov/api/v1/site_info/$s"            "siteinfo/${s}_info.json"
            probe "https://ameriflux.lbl.gov/sites/siteinfo/$s"          "siteinfo/${s}.html"
          done
          echo "===== discovery log ====="; cat "$log"

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add research/_canonical
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "Fetch canonical + availability/PI discovery via Actions runner [skip ci]"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
